<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Schedule | ORBIT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .timeline-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition-smooth);
            position: relative;
        }
        .timeline-item:hover {
            border-color: var(--cosmic-purple);
            transform: translateX(10px);
        }
        .status-badge {
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-on-schedule { background: rgba(0, 245, 255, 0.1); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); }
        .status-limited { background: rgba(108, 99, 255, 0.1); color: var(--cosmic-purple); border: 1px solid var(--cosmic-purple); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">ORBIT</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="destinations.html">Destinations</a></li>
            <li><a href="missions.html">Missions</a></li>
            <li><a href="gallery.html">Experience</a></li>
            <li><a href="contact.html">Inquiry</a></li>
        </ul>
        <div class="nav-actions">
            <button id="cart-btn" class="btn btn-primary" style="padding: 0.5rem 1.5rem; font-size: 0.8rem;">Manifest</button>
        </div>
    </nav>

    <main style="padding-top: 120px;">
        <section>
            <h1 class="section-title reveal">LAUNCH <span style="color: var(--cosmic-purple)">SCHEDULE</span></h1>
            <div id="missions-container" class="reveal" style="max-width: 800px; margin: 0 auto;">
                <p style="text-align: center;">Calculating orbital mechanics...</p>
            </div>
        </section>
    </main>

    <!-- AI Concierge & Drawer (Same as other pages) -->
    <div class="chat-fab">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </div>
    <div class="chat-window">
        <div class="chat-header">
            <h3>ORBIT Concierge</h3>
            <span class="chat-close" style="cursor:pointer;">&times;</span>
        </div>
        <div class="chat-messages">
            <div class="message bot">How can I assist your journey across the stars today?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="chat-input" placeholder="Inquire about Mars, safety, or pricing...">
            <button id="chat-send" class="btn btn-primary" style="padding: 0.5rem 1rem;">Send</button>
        </div>
    </div>
    <div class="drawer-overlay">
        <div class="drawer">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
                <h2>Journey Manifest</h2>
                <span class="close-drawer" style="cursor:pointer; font-size: 2rem;">&times;</span>
            </div>
            <div class="cart-items" style="flex:1; overflow-y:auto;"></div>
            <div class="cart-footer" style="padding-top: 2rem; border-top: 1px solid var(--glass-border);">
                <button onclick="checkout()" class="btn btn-primary checkout-btn" style="width: 100%;">Confirm Reservation</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        async function fetchMissions() {
            const container = document.getElementById('missions-container');
            try {
                const response = await fetch('/missions');
                const missions = await response.json();
                
                container.innerHTML = missions.map(mission => `
                    <div class="timeline-item">
                        <div>
                            <p style="color: var(--neon-cyan); font-weight: 800; font-size: 0.8rem; margin-bottom: 0.5rem;">${mission.launch_date}</p>
                            <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem;">${mission.name}</h3>
                            <p style="color: var(--lunar-silver); font-size: 0.9rem;">Spacecraft: ${mission.spacecraft}</p>
                        </div>
                        <div style="text-align: right;">
                            <span class="status-badge ${mission.status === 'On Schedule' ? 'status-on-schedule' : 'status-limited'}" style="display:inline-block; margin-bottom: 1rem;">${mission.status}</span>
                            <p style="color: var(--lunar-silver); font-size: 0.8rem;">Availability: ${mission.availability}</p>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<p style="text-align: center; color: #ff4444;">Unable to connect to Galactic Command.</p>';
            }
        }
        fetchMissions();
    </script>
</body>
</html>
